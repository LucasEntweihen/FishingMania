<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar o Ancião - RAG</title>
    <link rel="stylesheet" href="/style/tenda_anciao.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .chat-container {
            background: #1a1a2e; border: 1px solid #b388eb; border-radius: 12px;
            height: 65vh; display: flex; flex-direction: column; overflow: hidden;
            margin-top: 20px; box-shadow: 0 0 25px rgba(179, 136, 235, 0.1);
        }
        .chat-messages {
            flex: 1; padding: 25px; overflow-y: auto; display: flex;
            flex-direction: column; gap: 20px; scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 8px; }
        .chat-messages::-webkit-scrollbar-track { background: #0f0f1a; }
        .chat-messages::-webkit-scrollbar-thumb { background: #b388eb; border-radius: 4px; }
        .msg {
            max-width: 85%; padding: 15px 20px; border-radius: 12px;
            font-size: 1rem; line-height: 1.5; animation: fadeIn 0.4s ease-out;
            white-space: pre-wrap; 
        }
        .msg.user {
            background: linear-gradient(135deg, #b388eb, #9b59b6); color: #fff;
            align-self: flex-end; border-bottom-right-radius: 2px;
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.2);
        }
        .msg.bot {
            background: #2a2a4a; color: #e0e0e0; align-self: flex-start;
            border-bottom-left-radius: 2px; border: 1px solid #444;
        }
        .msg.error { background: #4a1c1c; border-color: #ff4d4d; color: #ffcccc; }
        .chat-input-area {
            display: flex; padding: 20px; background: #0f0f1a;
            border-top: 1px solid #333; gap: 15px;
        }
        .chat-input {
            flex: 1; padding: 15px; border-radius: 8px; border: 1px solid #444;
            background: #222; color: white; font-size: 1rem; outline: none;
            transition: border-color 0.3s;
        }
        .chat-input:focus { border-color: #b388eb; }
        .chat-input:disabled { background: #111; cursor: not-allowed; opacity: 0.7; }
        .send-btn {
            background: #b388eb; color: #000; border: none; padding: 0 30px;
            border-radius: 8px; font-weight: bold; font-size: 1rem;
            cursor: pointer; transition: all 0.3s;
        }
        .send-btn:hover:not(:disabled) {
            background: #9b59b6; box-shadow: 0 0 15px rgba(179, 136, 235, 0.4);
        }
        .send-btn:disabled { background: #555; color: #888; cursor: not-allowed; box-shadow: none; }
        .typing { font-style: italic; color: #aaa; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="back-btn" onclick="window.location.href='tenda_anciao.html'">⬅ Voltar aos Grimórios</button>
            <h1>Consultar o Ancião</h1>
            <p id="nomeGrimorioAtual">A ler as runas de: <b style="color: #b388eb;">Carregando...</b></p>
        </header>

        <main class="chat-container">
            <div class="chat-messages" id="chatBox">
                <div class="msg bot">Saudações, pescador. Sintonizei a minha mente com o seu grimório. O que as águas do conhecimento lhe trazem como dúvida hoje?</div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="perguntaInput" class="chat-input" placeholder="Pergunte ao Ancião..." onkeypress="verificarEnter(event)">
                <button class="send-btn" onclick="enviarPergunta()" id="btnEnviar">Perguntar</button>
            </div>
        </main>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const nomeGrimorio = urlParams.get('nome') || 'Grimório Desconhecido';
        const idGrimorio = urlParams.get('id');
        const userId = urlParams.get('user');
    
        document.getElementById("nomeGrimorioAtual").innerHTML = `A ler as runas de: <b style="color: #b388eb;">${nomeGrimorio}</b>`;
    
        const URL_API = "http://localhost:8000";
        const chatBox = document.getElementById("chatBox");
        const input = document.getElementById("perguntaInput");
        const btn = document.getElementById("btnEnviar");
    
        function verificarEnter(event) { if (event.key === 'Enter') enviarPergunta(); }
        function rolarParaBaixo() { chatBox.scrollTop = chatBox.scrollHeight; }
    
        window.enviarPergunta = async function() {
            const texto = input.value.trim();
            if (!texto) return;
    
            const divUser = document.createElement('div');
            divUser.className = 'msg user';
            divUser.textContent = texto; 
            chatBox.appendChild(divUser);
    
            input.value = "";
            input.disabled = true;
            btn.disabled = true;
            rolarParaBaixo();
    
            const idPensando = "pensando-" + Date.now();
            const divPensando = document.createElement('div');
            divPensando.className = 'msg bot typing';
            divPensando.id = idPensando;
            divPensando.innerHTML = "O Ancião está a consultar os pergaminhos... ⏳";
            chatBox.appendChild(divPensando);
            rolarParaBaixo();
    
            try {
                const resposta = await fetch(`${URL_API}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        texto: texto,
                        user_id: userId,        
                        grimorio_id: idGrimorio 
                    })
                });
    
                const dados = await resposta.json();
                const elemPensando = document.getElementById(idPensando);
                if (elemPensando) elemPensando.remove();
                
                const divBot = document.createElement('div');
                
                if (resposta.ok) {
                    divBot.className = 'msg bot markdown-body';
                    divBot.innerHTML = marked.parse(dados.resposta || "O silêncio reinou.");
                    
                    if(dados.restantes !== undefined) {
                        divBot.innerHTML += `<div style="margin-top: 15px; font-size: 0.75rem; color: #888; border-top: 1px solid #444; padding-top: 5px;">(Restam ${dados.restantes} perguntas hoje)</div>`;
                    }
                } else {
                    divBot.className = 'msg error';
                    divBot.textContent = `Aviso do Universo: ${dados.detail || "Falha desconhecida"}`;
                }
                chatBox.appendChild(divBot);
    
            } catch (erro) {
                const elemPensando = document.getElementById(idPensando);
                if (elemPensando) elemPensando.remove();
                
                const divErro = document.createElement('div');
                divErro.className = 'msg error';
                divErro.textContent = "A ligação telepática falhou com o servidor.";
                chatBox.appendChild(divErro);
            }
    
            input.disabled = false;
            btn.disabled = false;
            input.focus();
            rolarParaBaixo();
        };
    </script>
</body>
</html>
