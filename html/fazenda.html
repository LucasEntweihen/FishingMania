<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FishingMania - Fazenda de Quimeras</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Poppins:wght@500;600;800&display=swap" rel="stylesheet">
    
    <script src="/script/database.js"></script>
    <script src="/script/fusion.js"></script>
    
    <style>
        /* TRAVA UNIVERSAL DE ESPAÇAMENTO PARA NÃO QUEBRAR A TELA */
        *, *::before, *::after { box-sizing: border-box; }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #020617 url('/img/asset/farm.png') no-repeat center center fixed; background-size: cover; font-family: 'Poppins', sans-serif; color: #f8fafc; overflow: hidden; }
        
        body::after { content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 4px, 6px 100%; z-index: 998; pointer-events: none; opacity: 0.15; }

        .header { background: linear-gradient(90deg, rgba(2,44,34,0.9), rgba(6,78,59,0.9), rgba(2,44,34,0.9)); backdrop-filter: blur(10px); padding: 20px 40px; border-bottom: 2px solid #10b981; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: relative; height: 90px; }
        .header h1 { margin: 0; font-family: 'Fredoka', sans-serif; font-size: 2.2rem; color: #4ade80; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px rgba(74, 222, 128, 0.6), 0 0 30px rgba(74, 222, 128, 0.2); }
        .btn-back { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-family: 'Poppins'; backdrop-filter: blur(5px); }
        .btn-back:hover { background: #ef4444; border-color: #ef4444; box-shadow: 0 0 15px rgba(239,68,68,0.5); }

        /* MUDANÇA CRÍTICA AQUI: z-index: 20 e remoção do overflow hidden para o X poder sobrepor a barra verde */
        .main-container { display: flex; flex-direction: column; height: calc(100vh - 90px); width: 100%; position: relative; z-index: 20; }

        /* Sombra interna superior (inset 0 15px 30px) simula a sombra da barra verde no reator */
        .reactor-area { flex-shrink: 0; height: 40%; min-height: 280px; background: rgba(2, 6, 23, 0.5); backdrop-filter: blur(8px); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-bottom: 2px solid rgba(255,255,255,0.1); box-shadow: inset 0 15px 30px rgba(0,0,0,0.8), inset 0 -20px 50px rgba(0,0,0,0.8); }
        .reactor-area::before { content: ''; position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 0; }
        
        .fusion-stage { display: flex; align-items: center; justify-content: center; gap: 30px; margin-bottom: 20px; z-index: 1; }
        
        .fish-slot { width: 135px; height: 165px; padding: 10px; background: rgba(0,0,0,0.75); border: 3px dashed rgba(255,255,255,0.3); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; position: relative; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: inset 0 0 30px rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        
        .fish-slot::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 13px; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%); pointer-events: none; z-index: 1; }
        
        .fish-slot.filled { border: 3px solid #38bdf8; background: rgba(56, 189, 248, 0.2); box-shadow: 0 15px 35px rgba(56, 189, 248, 0.4), inset 0 0 40px rgba(56, 189, 248, 0.3); transform: translateY(-5px); }
        .fish-slot.error { border-color: #ef4444; background: rgba(239, 68, 68, 0.2); box-shadow: 0 0 25px rgba(239, 68, 68, 0.4); animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }

        .fish-slot img { width: 85px; height: 85px; object-fit: contain; filter: drop-shadow(0 15px 20px rgba(0,0,0,0.9)); z-index: 5; transition: 0.3s; margin: auto 0; }
        .fish-slot.filled:hover img { transform: scale(1.15); }
        
        .slot-name { font-size: 0.8rem; font-weight: bold; text-align: center; color: #f8fafc; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; z-index: 5; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }
        .slot-compat { font-size: 0.65rem; padding: 3px 8px; border-radius: 6px; margin-bottom: 5px; font-weight: 900; text-transform: uppercase; z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.8); }

        .plus-sign { font-size: 3rem; color: #f8fafc; font-family: 'Fredoka'; font-weight: bold; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.9)); opacity: 0.8; z-index: 1; }

        @keyframes btnPulse { 0% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); } 50% { box-shadow: 0 0 30px rgba(16, 185, 129, 0.8); } 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); } }

        .btn-fuse { background: linear-gradient(135deg, #10b981, #059669); color: white; border: 2px solid #34d399; padding: 12px 50px; border-radius: 12px; font-family: 'Fredoka'; font-size: 1.5rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 3px; z-index: 1; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .btn-fuse:not(:disabled) { animation: btnPulse 2s infinite; }
        .btn-fuse:hover:not(:disabled) { background: #059669; transform: translateY(-4px) scale(1.05); }
        .btn-fuse:disabled { background: #1e293b; color: #475569; border-color: #334155; cursor: not-allowed; animation: none; box-shadow: none; }

        .remove-btn { position: absolute; top: -15px; right: -15px; background: #ef4444; border: 3px solid #f8fafc; color: white; width: 35px; height: 35px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.9); z-index: 20; transition: 0.2s; }
        .remove-btn:hover { background: #f87171; transform: scale(1.15) rotate(90deg); }
        .fish-slot.filled .remove-btn { display: flex !important; }

        .inventory-area { flex: 1; min-height: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px); padding: 25px 30px; display: flex; flex-direction: column; box-shadow: inset 0 20px 30px rgba(0,0,0,0.8); border-top: 1px solid rgba(255,255,255,0.1); }
        .inventory-title { flex-shrink: 0; color: #38bdf8; font-family: 'Fredoka'; font-size: 1.6rem; margin: 0 0 20px 0; display: flex; align-items: center; gap: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        
        .fish-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; overflow-y: auto; padding-right: 10px; align-content: start; }
        
        .fish-card { background: linear-gradient(145deg, #1e293b, #020617); border: 1px solid #334155; border-radius: 12px; padding: 15px 10px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; box-shadow: 0 8px 15px rgba(0,0,0,0.6); overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 140px; }
        .fish-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); transition: left 0.4s; }
        .fish-card:hover::before { left: 100%; }
        .fish-card:hover { transform: translateY(-6px); border-color: #38bdf8; box-shadow: 0 12px 25px rgba(56, 189, 248, 0.5); z-index: 5; }
        .fish-card.infertil { filter: grayscale(1); opacity: 0.4; cursor: not-allowed; }
        .fish-card.infertil:hover { transform: none; border-color: #ef4444; box-shadow: none; }
        
        .fish-card img { width: 70px; height: 70px; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.6)); }
        .fish-count { position: absolute; top: 5px; right: 5px; background: #3b82f6; border: 1px solid #60a5fa; color: white; padding: 2px 8px; border-radius: 8px; font-size: 0.75rem; font-weight: 900; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 5; }
        
        .compat-amigavel { background: rgba(52, 211, 153, 0.2); color: #34d399; border: 1px solid #34d399; }
        .compat-agressivo { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .compat-monstruoso { background: rgba(168, 85, 247, 0.2); color: #c084fc; border: 1px solid #c084fc; }
        .compat-infertil { background: rgba(100, 116, 139, 0.3); color: #cbd5e1; border: 1px solid #94a3b8; }
        .compat-auto_suficiente { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid #fbbf24; }

        .custom-scrollbar::-webkit-scrollbar { width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.4); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }

        #fusion-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle, rgba(16, 185, 129, 0.9) 0%, rgba(2, 6, 23, 0.95) 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s; backdrop-filter: blur(15px); }
        #fusion-result-img { width: 350px; height: 350px; object-fit: contain; filter: drop-shadow(0 0 50px rgba(255,255,255,0.8)); transform: scale(0.1) rotate(-15deg); transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

    <div class="header">
        <h1>🧬 Fazenda de Quimeras</h1>
        <button class="btn-back" onclick="if(window.saveGame) { window.saveGame().then(() => window.location.href='/html/menu.html'); this.innerText = 'Salvando...'; } else { window.location.href='/html/menu.html'; }">⬅ Voltar ao Acampamento</button>
    </div>

    <div class="main-container">
        <div class="reactor-area">
            <div class="fusion-stage">
                <div class="fish-slot" id="slot-a">
                    <span style="font-size:4rem; opacity:0.2; z-index: 5;">A</span>
                    <div class="slot-name" style="color: rgba(255,255,255,0.3);">Espécime 1</div>
                </div>
                <div class="plus-sign">+</div>
                <div class="fish-slot" id="slot-b">
                    <span style="font-size:4rem; opacity:0.2; z-index: 5;">B</span>
                    <div class="slot-name" style="color: rgba(255,255,255,0.3);">Espécime 2</div>
                </div>
            </div>
            <button class="btn-fuse" id="btn-fuse" disabled onclick="window.executarFusao()">Fundir DNA</button>
            <div id="fusion-status" style="margin-top: 15px; font-weight: bold; font-size: 1rem; height: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">Aguardando amostras...</div>
        </div>

        <div class="inventory-area">
            <h2 class="inventory-title">⚙️ Tanque de Contenção (Seus Peixes)</h2>
            <div class="fish-grid custom-scrollbar" id="inventory-grid"></div>
        </div>
    </div>

    <div id="fusion-overlay">
        <h1 style="color: #fff; font-family: 'Fredoka'; font-size: 4.5rem; margin: 0; text-shadow: 0 0 20px rgba(16,185,129,0.8); letter-spacing: 2px;">QUIMERA VIVA!</h1>
        <img id="fusion-result-img" src="">
        <h2 id="fusion-result-name" style="color: #fcd34d; font-family: 'Fredoka'; font-size: 2.5rem; margin-top: 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.8);">Nome</h2>
        <p id="fusion-result-desc" style="color: #f8fafc; font-size: 1.2rem; font-weight: bold; max-width: 600px; text-align: center; line-height: 1.4;"></p>
        <button onclick="window.fecharOverlay()" style="margin-top: 40px; padding: 15px 50px; background: #020617; color: white; border: 2px solid #10b981; border-radius: 12px; font-size: 1.3rem; font-weight: 900; cursor: pointer; transition: 0.2s; text-transform: uppercase;">Continuar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHz1W47O5kTiEPw7OjEjSXD0eH_ICtfDA",
            authDomain: "fishingmania-6dced.firebaseapp.com",
            databaseURL: "https://fishingmania-6dced-default-rtdb.firebaseio.com",
            projectId: "fishingmania-6dced",
            storageBucket: "fishingmania-6dced.firebasestorage.app",
            messagingSenderId: "761476396898",
            appId: "1:761476396898:web:2b81f955acbf622a4c9e3b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let currentUser = null;
        
        window.GAME_STATE = {};
        window.slotA_Data = null;
        window.slotB_Data = null;

        window.saveGame = async function() {
            let safeInstances = window.GAME_STATE.hybridInstances || [];
            if (!Array.isArray(safeInstances)) safeInstances = Object.values(safeInstances);

            const playerSave = { 
                coins: window.GAME_STATE.coins || 0, 
                currentRodIndex: window.GAME_STATE.currentRodIndex || 0, 
                ownedRods: window.GAME_STATE.ownedRods || [0], 
                ownedSinkers: window.GAME_STATE.ownedSinkers || ['chumbo'], 
                currentSinker: window.GAME_STATE.currentSinker || 'chumbo', 
                ownedHooks: window.GAME_STATE.ownedHooks || ['anzol_padrao'], 
                currentHook: window.GAME_STATE.currentHook || 'anzol_padrao', 
                hookCustomTarget: window.GAME_STATE.hookCustomTarget || null, 
                ownedKnives: window.GAME_STATE.ownedKnives || ['faca_cozinha'], 
                currentKnife: window.GAME_STATE.currentKnife || 'faca_cozinha', 
                baitInventory: window.GAME_STATE.baitInventory || {}, 
                currentBait: window.GAME_STATE.currentBait || null, 
                collection: window.GAME_STATE.collection || {}, 
                collection67: window.GAME_STATE.collection67 || {}, 
                scrapCollection: window.GAME_STATE.scrapCollection || {}, 
                materials: window.GAME_STATE.materials || {}, 
                sushiUnlocked: window.GAME_STATE.sushiUnlocked || false, 
                orbs: window.GAME_STATE.orbs || {}, 
                tacticalSquad: window.GAME_STATE.tacticalSquad || [null, null, null, null, null],
                hybridInstances: safeInstances,
                customFusions: window.GAME_STATE.customFusions || {} 
            };

            if (currentUser) {
                localStorage.setItem('gatoPescadorSave_' + currentUser.uid, JSON.stringify(playerSave));
                try {
                    await set(ref(db, 'users/' + currentUser.uid), playerSave);
                } catch(e) {
                    console.error("Falha ao salvar no banco", e);
                }
            } else {
                localStorage.setItem('gatoPescadorSave_visitante', JSON.stringify(playerSave));
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                get(child(ref(db), `users/${user.uid}`)).then((snapshot) => {
                    if (snapshot.exists()) { window.GAME_STATE = snapshot.val(); } 
                    else { window.GAME_STATE = JSON.parse(localStorage.getItem('gatoPescadorSave_' + user.uid)) || {}; }
                    iniciarFazenda();
                });
            } else {
                window.GAME_STATE = JSON.parse(localStorage.getItem('gatoPescadorSave_visitante')) || {};
                iniciarFazenda();
            }
        });

        function iniciarFazenda() {
            if (!window.GAME_STATE.collection) window.GAME_STATE.collection = {};
            if (!window.GAME_STATE.collection67) window.GAME_STATE.collection67 = {};
            if (!window.GAME_STATE.hybridInstances) window.GAME_STATE.hybridInstances = [];
            if (!window.GAME_STATE.customFusions) window.GAME_STATE.customFusions = {};
            window.renderInventory();
        }

        window.getFishData = function(fishName) {
            for (const rarityKey in window.RARITIES) {
                const fish = window.RARITIES[rarityKey].variations.find(v => v.name === fishName);
                if (fish) return fish;
            }
            return null;
        };

        window.renderInventory = function() {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '';
            let hasFishes = false;

            let combinedCollection = {};
            
            if (window.GAME_STATE.collection) {
                Object.keys(window.GAME_STATE.collection).forEach(k => combinedCollection[k] = (combinedCollection[k] || 0) + window.GAME_STATE.collection[k]);
            }
            if (window.GAME_STATE.collection67) {
                Object.keys(window.GAME_STATE.collection67).forEach(k => combinedCollection[k] = (combinedCollection[k] || 0) + window.GAME_STATE.collection67[k]);
            }

            Object.keys(combinedCollection).forEach(fishName => {
                const count = combinedCollection[fishName];
                if (count > 0) {
                    hasFishes = true;
                    const fishData = window.getFishData(fishName);
                    if (!fishData) return;

                    const isInfertil = fishData.compat === 'infertil';
                    const card = document.createElement('div');
                    card.className = `fish-card ${isInfertil ? 'infertil' : ''}`;
                    
                    card.innerHTML = `
                        <div class="fish-count">x${count}</div>
                        <img src="${fishData.image}" onerror="this.src='https://placehold.co/80x80?text=?'">
                        <div style="font-size:0.8rem; font-weight:bold; color:#f8fafc; line-height:1.2;">${fishData.name}</div>
                        <div class="slot-compat compat-${fishData.compat}">${fishData.compat}</div>
                    `;

                    if (!isInfertil) { card.onclick = () => window.alocarPeixe(fishData, fishName); } 
                    else { card.onclick = () => alert("🔬 O DNA deste espécime não reage a fusões."); }

                    grid.appendChild(card);
                }
            });

            if (!hasFishes) grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:#94a3b8; padding: 50px; font-size: 1.2rem; background: rgba(0,0,0,0.5); border-radius: 12px;">O seu tanque está vazio. Volte para o Acampamento e saia para pescar!</div>`;
        };

        window.alocarPeixe = function(fishData, fishName) {
            if (fishData.compat === 'auto_suficiente') {
                window.slotA_Data = { name: fishName, data: fishData };
                window.slotB_Data = { name: fishName, data: fishData };
            } else {
                if (!window.slotA_Data) { window.slotA_Data = { name: fishName, data: fishData }; } 
                else if (!window.slotB_Data) { window.slotB_Data = { name: fishName, data: fishData }; } 
                else { window.slotA_Data = { name: fishName, data: fishData }; }
            }
            window.atualizarVisuaisReator();
        };

        window.removerSlot = function(slot) {
            if (slot === 'A') window.slotA_Data = null;
            if (slot === 'B') window.slotB_Data = null;
            if (window.slotA_Data && window.slotA_Data.data.compat === 'auto_suficiente') { window.slotA_Data = null; window.slotB_Data = null; }
            if (window.slotB_Data && window.slotB_Data.data.compat === 'auto_suficiente') { window.slotA_Data = null; window.slotB_Data = null; }
            window.atualizarVisuaisReator();
        };

        window.atualizarVisuaisReator = function() {
            const domA = document.getElementById('slot-a');
            const domB = document.getElementById('slot-b');
            const btnFuse = document.getElementById('btn-fuse');
            const status = document.getElementById('fusion-status');

            if (window.slotA_Data) {
                domA.className = 'fish-slot filled';
                domA.innerHTML = `<div class="remove-btn" onclick="window.removerSlot('A')">X</div><img src="${window.slotA_Data.data.image}"><div class="slot-name">${window.slotA_Data.name}</div><div class="slot-compat compat-${window.slotA_Data.data.compat}">${window.slotA_Data.data.compat}</div>`;
            } else {
                domA.className = 'fish-slot'; domA.innerHTML = `<span style="font-size:4rem; opacity:0.2; z-index: 5;">A</span><div class="slot-name" style="color: rgba(255,255,255,0.3);">Espécime 1</div>`;
            }

            if (window.slotB_Data) {
                domB.className = 'fish-slot filled';
                domB.innerHTML = `<div class="remove-btn" onclick="window.removerSlot('B')">X</div><img src="${window.slotB_Data.data.image}"><div class="slot-name">${window.slotB_Data.name}</div><div class="slot-compat compat-${window.slotB_Data.data.compat}">${window.slotB_Data.data.compat}</div>`;
            } else {
                domB.className = 'fish-slot'; domB.innerHTML = `<span style="font-size:4rem; opacity:0.2; z-index: 5;">B</span><div class="slot-name" style="color: rgba(255,255,255,0.3);">Espécime 2</div>`;
            }

            btnFuse.disabled = true; status.style.color = '#94a3b8';

            if (window.slotA_Data && window.slotB_Data) {
                if (window.slotA_Data.data.compat !== window.slotB_Data.data.compat) {
                    status.innerText = "❌ Rejeição de DNA: Tipagens Incompatíveis."; status.style.color = '#ef4444';
                    domA.classList.add('error'); domB.classList.add('error');
                } else {
                    const key = [window.slotA_Data.name, window.slotB_Data.name].sort().join('+');
                    if (window.FUSIONS && window.FUSIONS[key]) {
                        status.innerText = "✅ DNA Catalogado. Pronto para sequenciamento exato."; status.style.color = '#10b981'; btnFuse.disabled = false;
                    } else {
                        status.innerText = "🧬 Mutação Desconhecida: O reator gerará uma Quimera Aleatória!"; status.style.color = '#38bdf8'; btnFuse.disabled = false;
                    }
                }
            } else {
                status.innerText = "Aguardando duas amostras biológicas...";
            }
        };

        function consumeFish(fishName) {
            if (window.GAME_STATE.collection[fishName] > 0) {
                window.GAME_STATE.collection[fishName]--;
            } else if (window.GAME_STATE.collection67[fishName] > 0) {
                window.GAME_STATE.collection67[fishName]--;
            }
        }

        window.executarFusao = async function() {
            const isAuto = window.slotA_Data.data.compat === 'auto_suficiente';

            let stockA = (window.GAME_STATE.collection[window.slotA_Data.name] || 0) + (window.GAME_STATE.collection67[window.slotA_Data.name] || 0);
            let stockB = (window.GAME_STATE.collection[window.slotB_Data.name] || 0) + (window.GAME_STATE.collection67[window.slotB_Data.name] || 0);

            if (isAuto) {
                if (stockA < 1) { alert("Erro de sincronia no inventário."); return; }
            } else {
                if (window.slotA_Data.name === window.slotB_Data.name) {
                    if (stockA < 2) { alert("Você precisa de 2 cópias idênticas no estoque."); return; }
                } else {
                    if (stockA < 1 || stockB < 1) { alert("Peixes insuficientes."); return; }
                }
            }

            let resultado = window.FusionManager.processFusion(window.slotA_Data, window.slotB_Data);

            if (resultado) {
                if (resultado.isCustom) {
                    if (!window.GAME_STATE.customFusions) window.GAME_STATE.customFusions = {};
                    window.GAME_STATE.customFusions[resultado.id] = resultado;
                }

                if (isAuto) { 
                    consumeFish(window.slotA_Data.name); 
                } else { 
                    consumeFish(window.slotA_Data.name); 
                    consumeFish(window.slotB_Data.name); 
                }

                if (!Array.isArray(window.GAME_STATE.hybridInstances)) {
                    window.GAME_STATE.hybridInstances = Object.values(window.GAME_STATE.hybridInstances || {});
                }

                const novoFilhote = { uid: 'inst_' + Date.now() + Math.floor(Math.random()*1000), speciesId: resultado.id, equippedSkills: [] };
                window.GAME_STATE.hybridInstances.push(novoFilhote);
                
                await window.saveGame(); 
                window.mostrarSucesso(resultado);
            }

            window.slotA_Data = null; window.slotB_Data = null;
            window.atualizarVisuaisReator();
            window.renderInventory();
        };

        window.mostrarSucesso = function(resultadoData) {
            const overlay = document.getElementById('fusion-overlay');
            document.getElementById('fusion-result-name').innerText = resultadoData.name;
            document.getElementById('fusion-result-desc').innerText = resultadoData.desc;
            
            const imgEl = document.getElementById('fusion-result-img');
            
            imgEl.onerror = function() {
                this.onerror = null; 
                if (resultadoData.fallbackImage) {
                    this.src = resultadoData.fallbackImage;
                } else {
                    this.src = 'https://placehold.co/120x120?text=?';
                }
            };
            
            imgEl.src = resultadoData.image; 

            overlay.style.opacity = '1'; overlay.style.pointerEvents = 'auto';
            setTimeout(() => { imgEl.style.transform = 'scale(1.2) rotate(0deg)'; }, 100);
        };

        window.fecharOverlay = function() {
            const overlay = document.getElementById('fusion-overlay');
            overlay.style.opacity = '0'; overlay.style.pointerEvents = 'none';
            document.getElementById('fusion-result-img').style.transform = 'scale(0.1) rotate(-15deg)';
        };
    </script>
</body>
</html>
