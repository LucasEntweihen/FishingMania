<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FishingMania - Quartel Tático Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Poppins:wght@400;500;600;800&display=swap" rel="stylesheet">
    <script src="/script/database.js"></script>
    <script src="/script/fusion.js"></script>
    
    <style>
        /* TRAVA UNIVERSAL DE ESPAÇAMENTO E FONTES */
        *, *::before, *::after { box-sizing: border-box; }

        /* FUNDO: MESA DE COMANDO TÁTICO (Grid Holográfico) */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #020617; 
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; background-position: center center;
            font-family: 'Poppins', sans-serif; color: #f8fafc; overflow: hidden;
        }

        /* SCROLLBAR CYBERPUNK */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.4); border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.8); }

        /* CABEÇALHO */
        .header {
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.95), transparent);
            padding: 15px 30px; /* Reduzido para empurrar conteúdo para cima */
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
        }
        .header h1 { 
            margin: 0; font-family: 'Fredoka', sans-serif; font-size: 2.2rem; 
            text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(56,189,248,0.4));
        }
        .btn-retreat {
            background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #fca5a5; 
            padding: 10px 25px; border-radius: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: all 0.2s; font-family: 'Poppins', sans-serif;
        }
        .btn-retreat:hover { background: #ef4444; color: #fff; box-shadow: 0 0 20px rgba(239,68,68,0.5); transform: translateY(-2px); }

        /* LAYOUT PRINCIPAL */
        .main-container {
            display: flex; gap: 30px; 
            padding: 20px 20px; /* Reduzido top/bottom e lateral */
            max-width: 98%; /* Expandido para a esquerda (colado na parede) */
            margin: 0 auto;
            height: calc(100vh - 70px); /* Ajustado pelo novo cabeçalho */
        }

        /* PAINEL ESQUERDO: LISTA DE QUIMERAS */
        .left-panel {
            flex: 1; display: flex; flex-direction: column; gap: 20px;
            background: rgba(15, 23, 42, 0.6); border-radius: 20px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.05); 
            max-width: 450px; /* Mais espaço interno aproveitando o painel expandido */
        }
        .left-panel h2 { margin: 0; font-family: 'Fredoka', sans-serif; color: #bae6fd; font-size: 1.5rem; text-align: center; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 10px;}
        
        .roster-list {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 10px;
        }
        .roster-card {
            background: linear-gradient(90deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9)); 
            border: 1px solid rgba(56,189,248,0.2); border-radius: 12px; padding: 12px;
            display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden;
        }
        .roster-card:hover { transform: translateX(5px); border-color: #38bdf8; box-shadow: inset 0 0 20px rgba(56,189,248,0.1); }
        .roster-card.in-squad { border-color: #10b981; background: linear-gradient(90deg, rgba(6, 78, 59, 0.6), rgba(2, 44, 34, 0.8)); }
        .roster-card.in-squad::after { content: 'EM USO'; position: absolute; right: -25px; top: 15px; background: #10b981; color: #000; font-size: 0.6rem; font-weight: 800; padding: 2px 30px; transform: rotate(45deg); letter-spacing: 1px; }
        
        .roster-img { width: 50px; height: 50px; object-fit: contain; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.8)); }
        .roster-info { flex: 1; display: flex; flex-direction: column; }
        .roster-name { font-weight: 700; color: #f8fafc; font-size: 1rem; }
        .roster-stats { font-size: 0.75rem; color: #94a3b8; display: flex; gap: 10px; margin-top: 4px; font-weight: 600;}
        .stat-badge { background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); }

        /* PAINEL DIREITO: PELOTÃO E INSPEÇÃO */
        .right-panel {
            flex: 2.5; /* Ocupa o resto do espaço expandido */
            display: flex; flex-direction: column; 
            gap: 20px; /* Reduzido para empurrar os elementos para cima */
        }

        /* MÓDULO: PELOTÃO TÁTICO */
        .squad-container {
            background: rgba(15, 23, 42, 0.6); border-radius: 20px; 
            padding: 20px 30px; /* Reduzido padding superior e inferior */
            border: 1px solid rgba(56, 189, 248, 0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; gap: 15px;
        }
        .squad-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid rgba(56,189,248,0.2); padding-bottom: 10px; }
        .squad-header h2 { margin: 0; font-family: 'Fredoka', sans-serif; color: #38bdf8; font-size: 1.8rem; }
        .btn-deploy {
            background: linear-gradient(135deg, #10b981, #047857); border: 1px solid #34d399; color: white;
            padding: 12px 30px; border-radius: 8px; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); font-family: 'Fredoka', sans-serif;
        }
        .btn-deploy:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 25px rgba(16, 185, 129, 0.8); }
        .btn-deploy:disabled { background: #3f3f46; border-color: #52525b; color: #a1a1aa; cursor: not-allowed; box-shadow: none; }

        .squad-slots { display: flex; justify-content: space-between; gap: 15px; }
        
        .slot-wrapper {
            flex: 1; aspect-ratio: 1/1.2; background: rgba(0,0,0,0.4); border: 2px dashed rgba(100,116,139,0.5); border-radius: 16px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: 0.3s;
        }
        .slot-wrapper.filled { border-style: solid; border-color: #38bdf8; background: radial-gradient(circle at bottom, rgba(56, 189, 248, 0.15), transparent); box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        
        /* PEDESTAL HOLOGRÁFICO */
        .holo-pedestal {
            position: absolute; bottom: 15%; width: 70%; height: 20px;
            background: radial-gradient(ellipse, rgba(56, 189, 248, 0.6), transparent 70%);
            border-radius: 50%; filter: blur(2px); transform: perspective(100px) rotateX(60deg);
        }
        @keyframes floatHolo { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        
        .slot-img { width: 80%; height: 80%; object-fit: contain; z-index: 2; animation: floatHolo 4s ease-in-out infinite; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.8)); }
        .slot-number { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #0f172a; color: #64748b; font-weight: 900; padding: 2px 10px; border-radius: 10px; border: 1px solid #1e293b; font-family: 'Fredoka', sans-serif;}
        .slot-wrapper.filled .slot-number { color: #38bdf8; border-color: #38bdf8; box-shadow: 0 0 10px rgba(56,189,248,0.5); background: #020617; }
        
        .btn-remove {
            position: absolute; top: 10px; right: 10px; background: rgba(239, 68, 68, 0.8); color: white; border: none;
            width: 25px; height: 25px; border-radius: 50%; font-weight: bold; cursor: pointer; opacity: 0; transition: 0.2s; z-index: 10;
        }
        .slot-wrapper.filled:hover .btn-remove { opacity: 1; }
        .btn-remove:hover { background: #ef4444; transform: scale(1.2); }

        /* MÓDULO: INSPEÇÃO DE UNIDADE */
        .inspect-container {
            flex: 1; background: rgba(15, 23, 42, 0.6); border-radius: 20px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; position: relative; overflow: hidden;
        }
        .inspect-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #64748b; font-size: 1.2rem; font-family: 'Fredoka'; background: rgba(2,6,23,0.8); z-index: 10; backdrop-filter: blur(5px); }
        
        .inspect-header { display: flex; gap: 30px; margin-bottom: 20px; align-items: center; }
        .inspect-img-box { width: 150px; height: 150px; background: rgba(0,0,0,0.5); border-radius: 16px; border: 1px solid rgba(56,189,248,0.3); display: flex; align-items: center; justify-content: center; position: relative; }
        .inspect-img-box img { max-width: 90%; max-height: 90%; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.8)); animation: floatHolo 3s ease-in-out infinite; }
        
        .inspect-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .inspect-name { margin: 0 0 10px 0; font-family: 'Fredoka', sans-serif; font-size: 2.2rem; color: #f8fafc; text-shadow: 0 2px 5px rgba(0,0,0,0.8); line-height: 1.1; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .stat-box { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px; text-align: center; }
        .stat-lbl { color: #94a3b8; font-size: 0.7rem; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .stat-val { color: #fff; font-family: 'Fredoka', sans-serif; font-size: 1.5rem; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .val-hp { color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.4); }
        .val-atk { color: #f87171; text-shadow: 0 0 10px rgba(248, 113, 113, 0.4); }
        .val-def { color: #60a5fa; text-shadow: 0 0 10px rgba(96, 165, 250, 0.4); }
        .val-spd { color: #facc15; text-shadow: 0 0 10px rgba(250, 204, 21, 0.4); }

        .skills-section { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 15px; flex: 1; display: flex; flex-direction: column;}
        .skills-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .skills-header h3 { margin: 0; color: #bae6fd; font-family: 'Fredoka'; font-size: 1.2rem; }
        .skills-header span { color: #94a3b8; font-size: 0.85rem; font-weight: bold; }
        
        .skills-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .skill-chip {
            background: rgba(30, 41, 59, 0.8); border: 1px solid #334155; padding: 8px 15px; border-radius: 8px;
            display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; flex: 1 1 calc(33% - 10px);
        }
        .skill-chip:hover { background: #334155; border-color: #94a3b8; }
        .skill-chip.equipped { background: rgba(56, 189, 248, 0.15); border-color: #38bdf8; box-shadow: inset 0 0 10px rgba(56,189,248,0.2); }
        .skill-chip.equipped .s-icon { filter: drop-shadow(0 0 5px #38bdf8); }
        .s-icon { font-size: 1.2rem; }
        .s-info { display: flex; flex-direction: column; }
        .s-name { font-weight: 700; color: #e2e8f0; font-size: 0.85rem; }
        .s-desc { font-size: 0.65rem; color: #94a3b8; line-height: 1.2; margin-top: 2px; }

        .inspect-actions { margin-top: 20px; display: flex; justify-content: flex-end; }
        .btn-assign {
            background: transparent; border: 2px solid #38bdf8; color: #38bdf8; padding: 10px 25px; border-radius: 8px;
            font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; font-family: 'Poppins', sans-serif;
        }
        .btn-assign:hover { background: #38bdf8; color: #000; box-shadow: 0 0 15px rgba(56,189,248,0.5); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Quartel Tático Central</h1>
        <button class="btn-retreat" onclick="window.location.href='/html/menu.html'">Retornar à Base</button>
    </div>

    <div class="main-container">
        
        <div class="left-panel">
            <h2>🧪 Arsenal Quimérico</h2>
            <div class="roster-list custom-scrollbar" id="roster-list"></div>
        </div>

        <div class="right-panel">
            
            <div class="squad-container">
                <div class="squad-header">
                    <h2>🛡️ Pelotão da Vanguarda</h2>
                    <button class="btn-deploy" id="btn-deploy" onclick="window.location.href='/html/campanha.html'" disabled>PELOTÃO VAZIO</button>
                </div>
                <div class="squad-slots" id="squad-slots">
                    <div class="slot-wrapper"><span class="slot-number">01</span><div class="holo-pedestal"></div></div>
                    <div class="slot-wrapper"><span class="slot-number">02</span><div class="holo-pedestal"></div></div>
                    <div class="slot-wrapper"><span class="slot-number">03</span><div class="holo-pedestal"></div></div>
                    <div class="slot-wrapper"><span class="slot-number">04</span><div class="holo-pedestal"></div></div>
                    <div class="slot-wrapper"><span class="slot-number">05</span><div class="holo-pedestal"></div></div>
                </div>
            </div>

            <div class="inspect-container" id="inspect-panel">
                <div class="inspect-empty" id="inspect-empty">Selecione uma Quimera para Análise Tática</div>
                <div id="inspect-content" style="display: none; height: 100%; flex-direction: column;"></div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ── CONFIG FIREBASE ──────────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyDHz1W47O5kTiEPw7OjEjSXD0eH_ICtfDA",
            authDomain: "fishingmania-6dced.firebaseapp.com",
            databaseURL: "https://fishingmania-6dced-default-rtdb.firebaseio.com",
            projectId: "fishingmania-6dced",
            storageBucket: "fishingmania-6dced.firebasestorage.app",
            messagingSenderId: "761476396898",
            appId: "1:761476396898:web:2b81f955acbf622a4c9e3b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getDatabase(app);
        let currentUser = null;

        // ── ESTADO GLOBAL ────────────────────────────────────────────────
        window.GAME_STATE   = {};
        window.inspectingUid = null;

        // ── SAVE (padrão canônico do projeto — Dual-Layer) ───────────────
        window.saveGame = async function() {
            // VACINA: previne coerção de Array→Object no Firebase RTDB
            let safeInstances = window.GAME_STATE.hybridInstances || [];
            if (!Array.isArray(safeInstances)) safeInstances = Object.values(safeInstances);

            const playerSave = {
                coins:             window.GAME_STATE.coins             || 0,
                currentRodIndex:   window.GAME_STATE.currentRodIndex   || 0,
                ownedRods:         window.GAME_STATE.ownedRods         || [0],
                ownedSinkers:      window.GAME_STATE.ownedSinkers      || ['chumbo'],
                currentSinker:     window.GAME_STATE.currentSinker     || 'chumbo',
                ownedHooks:        window.GAME_STATE.ownedHooks        || ['anzol_padrao'],
                currentHook:       window.GAME_STATE.currentHook       || 'anzol_padrao',
                hookCustomTarget:  window.GAME_STATE.hookCustomTarget  || null,
                ownedKnives:       window.GAME_STATE.ownedKnives       || ['faca_cozinha'],
                currentKnife:      window.GAME_STATE.currentKnife      || 'faca_cozinha',
                baitInventory:     window.GAME_STATE.baitInventory     || {},
                currentBait:       window.GAME_STATE.currentBait       || null,
                collection:        window.GAME_STATE.collection        || {},
                collection67:      window.GAME_STATE.collection67      || {},
                scrapCollection:   window.GAME_STATE.scrapCollection   || {},
                materials:         window.GAME_STATE.materials         || {},
                sushiUnlocked:     window.GAME_STATE.sushiUnlocked     || false,
                orbs:              window.GAME_STATE.orbs              || {},
                tacticalSquad:     window.GAME_STATE.tacticalSquad     || [null, null, null, null, null],
                hybridInstances:   safeInstances,
                customFusions:     window.GAME_STATE.customFusions     || {}
            };

            if (currentUser) {
                localStorage.setItem('gatoPescadorSave_' + currentUser.uid, JSON.stringify(playerSave));
                try { await set(ref(db, 'users/' + currentUser.uid), playerSave); }
                catch(e) { console.error("Falha ao salvar no Firebase:", e); }
            } else {
                localStorage.setItem('gatoPescadorSave_visitante', JSON.stringify(playerSave));
            }
        };

        // ── CARGA DO SAVE ────────────────────────────────────────────────
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                get(child(ref(db), `users/${user.uid}`))
                    .then((snapshot) => {
                        if (snapshot.exists()) {
                            window.GAME_STATE = snapshot.val();
                        } else {
                            window.GAME_STATE = JSON.parse(localStorage.getItem('gatoPescadorSave_' + user.uid)) || {};
                        }
                        iniciarQuartel();
                    })
                    .catch(() => {
                        // Timeout fallback — motor não trava aguardando nuvem
                        window.GAME_STATE = JSON.parse(localStorage.getItem('gatoPescadorSave_' + user.uid)) || {};
                        iniciarQuartel();
                    });
            } else {
                window.GAME_STATE = JSON.parse(localStorage.getItem('gatoPescadorSave_visitante')) || {};
                iniciarQuartel();
            }
        });

        // ── INIT ─────────────────────────────────────────────────────────
        function iniciarQuartel() {
            // Normalização de estado
            if (!window.GAME_STATE.hybridInstances) window.GAME_STATE.hybridInstances = [];
            if (!Array.isArray(window.GAME_STATE.hybridInstances))
                window.GAME_STATE.hybridInstances = Object.values(window.GAME_STATE.hybridInstances);
            if (!window.GAME_STATE.tacticalSquad)  window.GAME_STATE.tacticalSquad = [null, null, null, null, null];
            if (!window.GAME_STATE.customFusions)  window.GAME_STATE.customFusions = {};

            window.renderSquad();
            window.renderRoster();
        }

        // ── HELPERS ──────────────────────────────────────────────────────
        // Resolve os dados de espécie de um híbrido:
        // tenta window.FUSIONS (catálogo estático de fusion.js) antes de
        // cair no dicionário customFusions do save (mutantes procedurais).
        window.getHybridData = function(speciesId) {
            if (window.FUSIONS) {
                const key = Object.keys(window.FUSIONS).find(k => window.FUSIONS[k].id === speciesId);
                if (key) return window.FUSIONS[key];
            }
            if (window.GAME_STATE.customFusions && window.GAME_STATE.customFusions[speciesId])
                return window.GAME_STATE.customFusions[speciesId];
            return null;
        };

        // Retorna a lista de skills disponíveis de um híbrido,
        // suportando tanto a chave legada (skillPool) quanto a nova (available_skills).
        function getSkillPool(inst) {
            if (inst.skillPool && inst.skillPool.length) return inst.skillPool;
            const fishData = window.getHybridData(inst.speciesId);
            return (fishData && fishData.available_skills) ? fishData.available_skills : [];
        }

        // ── RENDER: PELOTÃO (slots superiores) ───────────────────────────
        window.renderSquad = function() {
            const slots     = document.getElementById('squad-slots');
            slots.innerHTML = '';

            const squad = window.GAME_STATE.tacticalSquad || [null, null, null, null, null];
            let safeInstances = window.GAME_STATE.hybridInstances || [];
            if (!Array.isArray(safeInstances)) safeInstances = Object.values(safeInstances);

            let activeCount = 0;

            for (let i = 0; i < 5; i++) {
                const uid  = squad[i];
                const inst = uid ? safeInstances.find(h => h.uid === uid) : null;
                const div  = document.createElement('div');

                if (inst) {
                    activeCount++;
                    const fishData = window.getHybridData(inst.speciesId);
                    const imgSrc   = (fishData && fishData.image) ? fishData.image : (inst.image || 'https://placehold.co/80x80?text=?');
                    const name     = (fishData && fishData.name)  ? fishData.name  : (inst.name  || '???');
                    const fallback = (fishData && fishData.fallbackImage) ? fishData.fallbackImage : 'https://placehold.co/80x80?text=?';

                    div.className = 'slot-wrapper filled';
                    div.onclick   = () => window.inspectFish(inst.uid);
                    div.innerHTML = `
                        <span class="slot-number">0${i + 1}</span>
                        <button class="btn-remove" onclick="window.removeFromSquad(${i}, event)">&times;</button>
                        <div class="holo-pedestal"></div>
                        <img src="${imgSrc}" class="slot-img"
                             onerror="this.onerror=null; this.src='${fallback}'">
                    `;
                } else {
                    div.className = 'slot-wrapper';
                    div.innerHTML = `<span class="slot-number">0${i + 1}</span><div class="holo-pedestal"></div>`;
                }
                slots.appendChild(div);
            }

            // Botão Iniciar Incursão — habilitado se ao menos 1 slot ocupado
            const deployBtn = document.getElementById('btn-deploy');
            if (activeCount > 0) {
                deployBtn.disabled  = false;
                deployBtn.innerText = 'INICIAR INCURSÃO';
            } else {
                deployBtn.disabled  = true;
                deployBtn.innerText = 'PELOTÃO VAZIO';
            }
        };

        // ── RENDER: ROSTER (painel esquerdo) ─────────────────────────────
        window.renderRoster = function() {
            const list      = document.getElementById('roster-list');
            list.innerHTML  = '';

            let safeInstances = window.GAME_STATE.hybridInstances || [];
            if (!Array.isArray(safeInstances)) safeInstances = Object.values(safeInstances);

            if (safeInstances.length === 0) {
                list.innerHTML = `
                    <div style="color:#64748b; text-align:center; padding:20px; font-style:italic; line-height:1.6;">
                        Nenhuma quimera no arsenal.<br>
                        Vá para a Fazenda de Quimeras para fundir seus soldados mutantes!
                    </div>`;
                return;
            }

            const squad = window.GAME_STATE.tacticalSquad || [];

            safeInstances.forEach(inst => {
                const fishData = window.getHybridData(inst.speciesId);
                // Se a espécie ainda não carregou (fusion.js pendente), usa dados brutos do inst
                const imgSrc   = (fishData && fishData.image) ? fishData.image : (inst.image || 'https://placehold.co/50x50?text=?');
                const name     = (fishData && fishData.name)  ? fishData.name  : (inst.name  || '???');
                const fallback = (fishData && fishData.fallbackImage) ? fishData.fallbackImage : 'https://placehold.co/50x50?text=?';
                const inSquad  = squad.includes(inst.uid);

                // Lê stats de forma compatível com ambas as schemas (stats.hp / tactical_stats.HP)
                const hp  = inst.stats?.hp  ?? fishData?.tactical_stats?.HP  ?? '?';
                const atk = inst.stats?.atk ?? fishData?.tactical_stats?.ATK ?? '?';

                const customBadge = (fishData && fishData.isCustom)
                    ? `<div style="position:absolute;top:-5px;left:-5px;font-size:1.3rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8));z-index:5;" title="Mutante Procedural">🧬</div>`
                    : '';

                const div = document.createElement('div');
                div.className = `roster-card ${inSquad ? 'in-squad' : ''}`;
                div.onclick   = () => window.inspectFish(inst.uid);
                div.style.position = 'relative';
                div.innerHTML = `
                    ${customBadge}
                    <img src="${imgSrc}" class="roster-img"
                         onerror="this.onerror=null; this.src='${fallback}'">
                    <div class="roster-info">
                        <div class="roster-name">${name}</div>
                        <div class="roster-stats">
                            <span class="stat-badge val-hp">HP ${hp}</span>
                            <span class="stat-badge val-atk">ATK ${atk}</span>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        };

        // ── INSPEÇÃO DE UNIDADE ───────────────────────────────────────────
        window.inspectFish = function(uid) {
            window.inspectingUid = uid;
            window.renderRoster(); // atualiza o highlight "selected" no roster

            document.getElementById('inspect-empty').style.display  = 'none';
            const content = document.getElementById('inspect-content');
            content.style.display = 'flex';

            let safeInstances = window.GAME_STATE.hybridInstances || [];
            if (!Array.isArray(safeInstances)) safeInstances = Object.values(safeInstances);

            const inst = safeInstances.find(h => h.uid === uid);
            if (!inst) return;

            const fishData = window.getHybridData(inst.speciesId) || {};
            const imgSrc   = fishData.image   || inst.image || 'https://placehold.co/150x150?text=?';
            const name     = fishData.name    || inst.name  || '???';
            const fallback = fishData.fallbackImage || 'https://placehold.co/150x150?text=?';

            // Stats — compatível com schema antiga (inst.stats) e nova (fishData.tactical_stats)
            const hp  = inst.stats?.hp  ?? fishData.tactical_stats?.HP  ?? '?';
            const atk = inst.stats?.atk ?? fishData.tactical_stats?.ATK ?? '?';
            const def = inst.stats?.def ?? fishData.tactical_stats?.DEF ?? '?';
            const spd = inst.stats?.spd ?? fishData.tactical_stats?.SPD ?? '?';

            const inSquad    = (window.GAME_STATE.tacticalSquad || []).includes(uid);
            const equipped   = inst.equippedSkills || [];
            const skillPool  = getSkillPool(inst);

            // Botão de ação pelotão
            const btnHtml = inSquad
                ? `<button class="btn-assign" style="color:#ef4444;border-color:#ef4444;"
                        onclick="window.removeFromSquadByUid('${uid}')">Remover do Pelotão</button>`
                : `<button class="btn-assign"
                        onclick="window.addToSquad('${uid}')">Designar ao Pelotão</button>`;

            // Skills
            let skillsHtml = '';
            skillPool.forEach(skillId => {
                const sData = window.SKILLS ? window.SKILLS[skillId] : null;
                if (!sData) return;
                const isEq   = equipped.includes(skillId);
                const canAdd = equipped.length < 3 || isEq;
                skillsHtml += `
                    <div class="skill-chip ${isEq ? 'equipped' : ''} ${!canAdd ? 'disabled' : ''}"
                         onclick="${canAdd ? `window.toggleSkill('${uid}','${skillId}')` : ''}">
                        <span class="s-icon">${sData.icon}</span>
                        <div class="s-info">
                            <span class="s-name">${sData.name}</span>
                            <span class="s-desc">${sData.desc}</span>
                        </div>
                    </div>
                `;
            });

            content.innerHTML = `
                <div class="inspect-header">
                    <div class="inspect-img-box">
                        <img src="${imgSrc}" onerror="this.onerror=null;this.src='${fallback}'">
                    </div>
                    <div class="inspect-details">
                        <h2 class="inspect-name">${name}</h2>
                        <div class="stats-grid">
                            <div class="stat-box"><span class="stat-lbl">Vida (HP)</span><span class="stat-val val-hp">${hp}</span></div>
                            <div class="stat-box"><span class="stat-lbl">Ataque (ATK)</span><span class="stat-val val-atk">${atk}</span></div>
                            <div class="stat-box"><span class="stat-lbl">Defesa (DEF)</span><span class="stat-val val-def">${def}</span></div>
                            <div class="stat-box"><span class="stat-lbl">Velocid. (SPD)</span><span class="stat-val val-spd">${spd}</span></div>
                        </div>
                    </div>
                </div>
                <div class="skills-section">
                    <div class="skills-header">
                        <h3>🧬 Memória Genética Ativa</h3>
                        <span>${equipped.length}/3 Slots</span>
                    </div>
                    <div class="skills-grid">
                        ${skillsHtml || '<span style="color:#64748b;font-size:0.8rem;">Nenhuma habilidade mutante desenvolvida.</span>'}
                    </div>
                </div>
                <div class="inspect-actions">${btnHtml}</div>
            `;
        };

        // ── SKILL TOGGLE ─────────────────────────────────────────────────
        window.toggleSkill = async function(uid, skillId) {
            let safeInstances = window.GAME_STATE.hybridInstances || [];
            if (!Array.isArray(safeInstances)) safeInstances = Object.values(safeInstances);

            const inst = safeInstances.find(h => h.uid === uid);
            if (!inst) return;
            if (!inst.equippedSkills) inst.equippedSkills = [];

            const index = inst.equippedSkills.indexOf(skillId);
            if (index > -1) {
                inst.equippedSkills.splice(index, 1);
            } else {
                if (inst.equippedSkills.length < 3) inst.equippedSkills.push(skillId);
            }
            await window.saveGame();
            window.inspectFish(uid);
            window.renderRoster();
        };

        // ── GESTÃO DO PELOTÃO ─────────────────────────────────────────────
        window.addToSquad = async function(uid) {
            const emptyIndex = window.GAME_STATE.tacticalSquad.indexOf(null);
            if (emptyIndex === -1) {
                alert('⚠ O pelotão da Vanguarda está cheio! Retire uma unidade primeiro.');
                return;
            }
            window.GAME_STATE.tacticalSquad[emptyIndex] = uid;
            await window.saveGame();
            window.renderSquad();
            window.inspectFish(uid);
        };

        window.removeFromSquad = async function(slotIndex, event) {
            event.stopPropagation();
            window.GAME_STATE.tacticalSquad[slotIndex] = null;
            await window.saveGame();
            window.renderSquad();
            if (window.inspectingUid) window.inspectFish(window.inspectingUid);
            window.renderRoster();
        };

        window.removeFromSquadByUid = async function(uid) {
            const index = window.GAME_STATE.tacticalSquad.indexOf(uid);
            if (index > -1) window.GAME_STATE.tacticalSquad[index] = null;
            await window.saveGame();
            window.renderSquad();
            window.inspectFish(uid);
            window.renderRoster();
        };
    </script>
</body>
</html>
